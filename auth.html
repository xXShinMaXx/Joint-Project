<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>居力ウェブサイト</title>
  <link rel="stylesheet" href="auth.css">
  <script src="https://kit.fontawesome.com/db86999413.js" crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght,YOPQ@100..900,300&display=swap" rel="stylesheet">
</head>
<body>

  <div class="wrapper">
        <span class="bg-animate"></span>
        <span class="bg-animate2"></span>
        <div class="form-box login">
            <h2 class="animation" style="--i:0; --j:21;">ログイン</h2>
            <form action="process-login.php" method="POST">
                <div class="input-box animation" style="--i:1; --j:22">
                    <input type="text" name="username" required>
                    <label>ユーザー名</label>
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box animation" style="--i:2; --j:23">
                    <input type="password" name="password" required>
                    <label>パスワード</label>
                    <i class='bx bx-lock'></i>
                </div>
                <button type="submit" class="btn animation" style="--i:3; --j:24">ログイン</button>
                <div class="logreg-link animation" style="--i:4; --j:25">
                    <p>アカウントを作成する <a href="#" class="register-link">新規登録</a></p>
                </div>
            </form>
        </div>
        <div class="info-text login">
            <h2 class="animation" style="--i:0; --j:20;">ログインしてください</h2>
            <p class="animation" style="--i:1; --j:21;">MIRAI NEXUS</p>
        </div>

        <div class="form-box register">
            <h2 class="animation" style="--i:17; --j:0;">新規登録</h2>
            <form action="process-login.php" method="POST">
                <input type="hidden" name="action" value="register">
                <div class="input-box animation" style="--i:18; --j:1;">
                    <input type="text" name="username" required>
                    <label>ユーザー名</label>
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box animation" style="--i:19; --j:2;">
                    <input type="text" name="email" required>
                    <label>メールアドレス</label>
                    <i class='bx bx-envelope'></i>
                </div>
                <div class="input-box animation" style="--i:20; --j:3;">
                    <input type="password" name="password" required>
                    <label>パスワード</label>
                    <i class='bx bx-lock'></i>
                </div>
                <button type="submit" class="btn animation" style="--i:21; --j:4;">新規登録</button>
                <div class="logreg-link animation" style="--i:22; --j:5;">
                    <p>既にアカウントをお持ちの方 <a href="#" class="login-link">ログイン</a></p>
                </div>
            </form>
        </div>

        <div class="info-text register">
            <h2 class="animation" style="--i:17; --j:0;">会員登録</h2>
            <p class="animation" style="--i:18; --j:1;">MIRAI NEXUS</p>
        </div>
    </div>

 <script src="auth.js"></script>
</body>
</html>
